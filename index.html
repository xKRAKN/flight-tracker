<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCD Live Flight Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Bacolod-Silay (BCD) Radar</h1>
        <p>Data updates on page refresh</p>
    </header>

    <div class="main-layout">
        <section class="map-container">
            <iframe 
                src="https://www.flightradar24.com/simple_index.php?lat=10.77&lon=123.01&z=10&airports=1" 
                width="100%" 
                height="100%" 
                frameborder="0">
            </iframe>
        </section>

        <aside class="sidebar">
            <div class="column">
                <h2>🛬 Approach</h2>
                <div id="arrivals-list" class="list">Loading...</div>
            </div>
            <div class="column">
                <h2>🛫 Departures</h2>
                <div id="departures-list" class="list">Loading...</div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
